{% extends 'core/base.html' %}

{% block content %}
<div class="form-container">
    <div class="card">
        <div class="card-body">
            <h2 class="card-title text-center">Recuperar Senha</h2>
            <p class="text-center text-muted mb-4">
                Digite seu endereço de email e enviaremos um link para redefinir sua senha.
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_email" class="form-label">Endereço de Email</label>
                    <input type="email" name="email" id="id_email" class="form-control" placeholder="seu@email.com" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Enviar Link de Recuperação</button>
            </form>
            <p class="mt-3 text-center">
                Lembrou sua senha? <a href="{% url 'login' %}">Voltar para o login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
